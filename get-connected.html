  <h1 id="get-connected">Get Connected!</h1>
  <p  id="get-connected-text"><small>Interested in using our technology to enhance your business? Let's get in touch.</small></p>
  <form class="nebula-form">
    <div class="nebula-form-container">
    <div class="mb-3">
        <label for="exampleInputUsername1" placeholder="Username" aria-label="Username" aria-describedby="basic-addon1">Full Name</label>
        <input type="text" class="form-control" id="exampleInputPassword1">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label">Phone Number</label>
      <input type="password" class="form-control" id="exampleInputPassword1">
    </div>
    <div class="mb-3 nebula-form-email">
      <label for="exampleInputEmail1" class="form-label">Email address</label>
      <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    </div>
    <div class="mb-3">
      <label for="exampleInputUsername1" placeholder="Username" aria-label="Username" aria-describedby="basic-addon1">Company/Business</label>
      <input type="text" class="form-control" aria-label="With textarea"></textarea>
    </div>
    <select class="form-select" aria-label="Default select example">
      <option selected>Select Your Country</option>
      <option value="1">United States</option>
      <option value="2">Canada</option>
      <option value="3">Mexico</option>
    </select>




    <button type="submit" class="btn btn-primary text-bg-success border border-success nebula-submit-button">Submit</button>
    </div>
  </form>
